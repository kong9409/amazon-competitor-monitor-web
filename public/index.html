<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amazon 竞品监控报告工具 by kong</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <div class="pill">Sorftime CLI · ASIN Monitor · HTML/PDF/Markdown</div>
        <h1>Amazon 竞品监控报告工具 by kong</h1>
        <p>复刻 Jax 丰哥在跨境写代码的 ASIN 竞品监控报告框架。输入 Sorftime CLI Token、自有 ASIN、竞品 ASIN 和关键词，即可生成同版式监控报告。</p>
        <a class="article-link" href="http://mp.weixin.qq.com/s?__biz=MzY5MTMyNTQ3Mg==&mid=2247483693&idx=1&sn=439089733fc16d941b2f413ab5c33453&chksm=f525c7bd3ba225a68fd0636cb24b43d67ce2a374315b5a9ecd43dc16baca5953332b9626109b&scene=126&sessionid=1782973447&subscene=227&clicktime=1782973450&enterid=1782973450#rd" target="_blank" rel="noopener">查看原文章：Jax 丰哥在跨境写代码</a>
      </div>
      <div class="notice">
        <b>使用说明</b>
        <span>Token 只用于本次调用，不写入报告。报告文件默认保存在 D 盘数据目录，支持 HTML、PDF、Markdown、JSON、CSV 和 ZIP 输出。</span>
      </div>
    </header>

    <main class="grid">
      <section class="card form-card">
        <h2>1. 输入监控配置</h2>
        <form id="runForm">
          <input type="hidden" name="marketplace" value="US" />
          <input type="hidden" name="domain" value="1" />
          <input type="hidden" name="productInterface" value="ProductRequest" />
          <input type="hidden" name="salesInterface" value="AsinSalesVolume" />
          <input type="hidden" name="asinKeywordsInterface" value="ASINRequestKeywordv2" />
          <input type="hidden" name="keywordInterface" value="ASINKeywordRanking" />
          <input type="hidden" name="keywordMetricInterface" value="KeywordExtends" />
          <input type="hidden" name="reviewInterface" value="ProductReviewsQuery" />

          <label>Sorftime CLI Token
            <input name="sorftimeToken" type="password" autocomplete="off" placeholder="粘贴你的 Sorftime CLI Token；不填则使用演示模式" />
          </label>

          <label>自有 ASIN（每行一个）
            <textarea name="ownAsins" rows="3" placeholder="B0OWN001"></textarea>
          </label>

          <label>竞品 ASIN（每行一个）
            <textarea name="competitorAsins" rows="5" placeholder="B0COMP01&#10;B0COMP02&#10;B0COMP03"></textarea>
          </label>

          <label>核心关键词（每行一个）
            <textarea name="coreKeywords" rows="5" placeholder="shower door&#10;frameless shower door"></textarea>
          </label>

          <button type="submit" id="runBtn">生成竞品监控报告</button>
        </form>
      </section>

      <section class="card output-card">
        <h2>2. 报告输出</h2>
        <div id="status" class="status idle">等待生成报告</div>
        <div id="summary" class="summary hidden"></div>
        <div id="links" class="links hidden"></div>
        <iframe id="preview" title="报告预览"></iframe>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
