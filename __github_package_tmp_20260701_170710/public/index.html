<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amazon 竞品监控报告工具</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <div class="pill">Sorftime CLI · ASIN Monitor · HTML/PDF/Markdown</div>
        <h1>Amazon 竞品监控报告工具</h1>
        <p>输入自己的 Sorftime CLI Token、自有 ASIN、竞品 ASIN 和核心关键词，一键生成 HTML 看板，并导出 PDF、Markdown、JSON、CSV 或 ZIP。</p>
      </div>
      <div class="notice">
        <b>安全提示</b>
        <span>Token 只用于本次调用，不写入报告、不保存到前端。部署到公网时建议仅团队内部使用。</span>
      </div>
    </header>

    <main class="grid">
      <section class="card form-card">
        <h2>1. 输入监控配置</h2>
        <form id="runForm">
          <label>市场 / 站点
            <select name="marketplace">
              <option value="US">US - 美国</option>
              <option value="CA">CA - 加拿大</option>
              <option value="UK">UK - 英国</option>
              <option value="DE">DE - 德国</option>
              <option value="FR">FR - 法国</option>
              <option value="IT">IT - 意大利</option>
              <option value="ES">ES - 西班牙</option>
            </select>
          </label>

          <label>Sorftime CLI Token
            <input name="sorftimeToken" type="password" autocomplete="off" placeholder="粘贴你的 Sorftime CLI Token；不填则使用演示模式" />
          </label>

          <div class="row">
            <label>Domain
              <input name="domain" value="1" />
            </label>
            <label class="check"><input name="demoMode" type="checkbox" /> 演示模式</label>
          </div>

          <label>自有 ASIN（每行一个）
            <textarea name="ownAsins" rows="3" placeholder="B0OWN001"></textarea>
          </label>

          <label>竞品 ASIN（每行一个）
            <textarea name="competitorAsins" rows="5" placeholder="B0COMP01&#10;B0COMP02&#10;B0COMP03"></textarea>
          </label>

          <label>核心关键词（每行一个）
            <textarea name="coreKeywords" rows="5" placeholder="power bank&#10;portable charger"></textarea>
          </label>

          <details>
            <summary>高级设置：CLI 接口名</summary>
            <div class="row three">
              <label>产品详情接口
                <input name="productInterface" value="ProductRequest" />
              </label>
              <label>销量接口
                <input name="salesInterface" value="AsinSalesVolume" />
              </label>
              <label>关键词接口
                <input name="keywordInterface" value="ASINKeywordRanking" />
              </label>
              <label>关键词指标接口
                <input name="keywordMetricInterface" value="KeywordRequest" />
              </label>
              <label>评论接口
                <input name="reviewInterface" value="ProductReviewsQuery" />
              </label>
            </div>
          </details>

          <button type="submit" id="runBtn">生成竞品监控报告</button>
        </form>
      </section>

      <section class="card output-card">
        <h2>2. 报告输出</h2>
        <div id="status" class="status idle">等待生成报告</div>
        <div id="summary" class="summary hidden"></div>
        <div id="links" class="links hidden"></div>
        <iframe id="preview" title="报告预览"></iframe>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
